<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi primera web</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      background: #222;
      padding: 20px;
      font-size: 24px;
      letter-spacing: 2px;
    }

    .contenedor {
      padding: 40px;
    }

    button {
      padding: 10px 20px;
      background: #ff3c00;
      border: none;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #ff6a3d;
    }
  </style>
</head>

<body>

  <header>
    MI WEB MEDIO PELO 🔥
  </header>

  <div class="contenedor">
    <h1>Hola 👀</h1>
    <p>Esto es una web simple hecha en 2 minutos</p>

    <button onclick="cambiarTexto()">tocame</button>
  </div>

  <script>
    function cambiarTexto() {
      document.querySelector("h1").innerText = "AHORA CAMBIÓ 😎";
    }
  </script>

</body>
</html>
